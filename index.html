<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R-Control</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="topbar">
      <h1>R-Control</h1>
      <div class="segmented" role="tablist" aria-label="Тема">
        <button id="theme-light" class="segmented-btn" data-theme="light">Светлая</button>
        <button id="theme-dark" class="segmented-btn" data-theme="dark">Тёмная</button>
      </div>
    </header>

    <main class="container">
      <section id="auth-card" class="card">
        <h2>Вход</h2>
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Пароль" />
        <button id="login-btn" class="btn-accent">Войти</button>
        <p id="auth-msg" class="muted"></p>
      </section>

      <section id="app" class="hidden">
        <div class="card">
          <div class="row-between">
            <div>
              <h2 id="welcome"></h2>
              <p id="role-label" class="muted"></p>
            </div>
            <button id="logout-btn">Выйти</button>
          </div>
        </div>

        <nav id="role-nav" class="tabs"></nav>
        <section id="content" class="card"></section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
