<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R-Control</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="topbar">
      <button id="menu-btn" class="icon-btn" aria-label="Открыть меню">☰</button>
      <h1>R-Control</h1>
      <div class="segmented" role="tablist" aria-label="Тема">
        <button class="segmented-btn" data-theme="light">Светлая</button>
        <button class="segmented-btn" data-theme="dark">Тёмная</button>
      </div>
    </header>

    <aside id="drawer" class="drawer hidden">
      <nav class="drawer-nav">
        <button data-menu="profile">Профиль</button>
        <button data-menu="history">История планов</button>
        <button data-menu="analytics">Аналитика</button>
        <button id="logout-btn">Выйти</button>
      </nav>
    </aside>

    <main class="container">
      <section id="auth-card" class="card">
        <h2>Вход</h2>
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Пароль" />
        <button id="login-btn" class="btn-accent">Войти</button>
        <p id="auth-msg" class="muted"></p>
      </section>

      <section id="app" class="hidden">
        <section id="dashboard" class="card"></section>
        <section id="content" class="card"></section>
      </section>
    </main>

    <footer id="action-bar" class="action-bar hidden"></footer>

    <script src="./app.js"></script>
  </body>
</html>
